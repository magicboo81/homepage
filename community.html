<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건강 칼럼 - 내몸에 온 한방연구소</title>
  <meta name="description" content="내몸에 온 한방연구소 김민부 원장이 전하는 매일 성장하는 올바른 한방 건강 칼럼">
  <link rel="icon" href="assets/images/logo_icon.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 커뮤니티 전용 추가 스타일 (style.css 에 넣을 수도 있으나 독립성 유지) */
    .community-page-wrapper {
      padding-top: 100px;
      padding-bottom: 60px;
      min-height: 100vh;
      background: var(--dark-bg);
    }
    .community-hero {
      text-align: center;
      margin-bottom: 40px;
      padding: 60px 20px;
      background: var(--dark-bg-2);
      border-radius: 20px;
      color: white;
    }
    .community-hero h1 {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      margin-bottom: 16px;
    }
    .community-hero p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
    }
    .blog-card {
      background: var(--dark-surface);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .blog-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      border-color: rgba(217, 190, 145, 0.3);
    }
    .blog-card-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: var(--dark-bg-2);
    }
    .blog-card-content {
      padding: 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    .blog-card-tag {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .blog-card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.4;
      color: var(--text-inverse);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .blog-card-desc {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 20px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex-grow: 1;
    }
    .blog-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 16px;
    }

  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo" style="gap: 14px;">
        <img src="assets/images/logo_icon.png" alt="로고 아이콘" style="height: 54px; width: 54px; object-fit: contain;">
        <div style="display:flex; flex-direction:column; justify-content:center;">
          <span class="nav-logo-text" style="font-size: 1.25rem;">내몸에 온 한방연구소</span>
          <span style="font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top:-2px; line-height:1;">김민부한의원 부설</span>
        </div>
      </a>
      <div class="nav-menu">
        <a href="index.html#funnel-slimhwan" class="nav-link">슬림환</a>
        <a href="index.html#funnel-kwaebyeon" class="nav-link">쾌변환</a>
        <a href="index.html#funnel-dunjam" class="nav-link">든ː잠</a>
        <a href="community.html" class="nav-link active">커뮤니티</a>
        <a href="index.html#funnel-clinic" class="nav-link">김민부한의원</a>
        <a href="http://pf.kakao.com/_kdxdxan/chat" target="_blank" class="nav-cta">💬 카톡 상담</a>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="메뉴 열기" onclick="document.getElementById('mobile-menu').classList.toggle('active'); this.classList.toggle('active'); document.body.style.overflow = this.classList.contains('active') ? 'hidden' : '';">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu-overlay" id="mobile-menu">
    <div class="mobile-menu-list">
      <a href="index.html#funnel-slimhwan" class="mobile-link">슬림환</a>
      <a href="index.html#funnel-kwaebyeon" class="mobile-link">쾌변환</a>
      <a href="index.html#funnel-dunjam" class="mobile-link">든ː잠</a>
      <a href="community.html" class="mobile-link active">커뮤니티</a>
      <a href="index.html#funnel-clinic" class="mobile-link">김민부한의원</a>
      <a href="http://pf.kakao.com/_kdxdxan/chat" target="_blank" class="btn-primary" style="margin-top:16px;">💬 카톡 상담</a>
    </div>
  </div>

  <main class="community-page-wrapper">
    <div class="container">
      <section class="community-hero">
        <h1>건강 칼럼</h1>
        <p>가장 올바른 자연의 처방, 김민부 원장이 들려주는 한방 이야기</p>
      </section>

      <!-- Loading State -->
      <div id="loading-state" style="text-align: center; padding: 60px 0; display: none;">
        <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #E2E8F0; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 16px; color: var(--text-secondary);">칼럼을 불러오는 중입니다...</p>
      </div>

      <!-- Blog Grid (Will be populated by JS) -->
      <div id="community-board" class="blog-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px;">
        <!-- Card Skeleton for visual preview before Notion API is connected -->
        <div class="blog-card" style="opacity: 0.6; pointer-events: none;">
          <div class="blog-card-img" style="display:flex; align-items:center; justify-content:center; color:#94E24A;">Image Preview</div>
          <div class="blog-card-content">
            <div class="blog-card-tag">카테고리</div>
            <div class="blog-card-title">노션 API 연동 대기 중입니다.</div>
            <div class="blog-card-desc">원장님께서 노션 API 키와 DB 아이디를 입력해주시면 이곳에 작성하신 글들이 자동으로 표시됩니다. 조금만 기다려주세요!</div>
            <div class="blog-card-footer">
              <span>작성일</span>
              <span>작성자</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <script src="js/community.js"></script>
</body>
</html>

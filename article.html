  <meta property="og:title" content="건강 칼럼 읽기">

  <style>
    /* 칼럼 페이지 전용 스타일 */
    .article-page-wrapper {
      padding-top: 120px;
      padding-bottom: 80px;
      min-height: 100vh;
      background: var(--dark-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .article-container {
      width: 100%;
      max-width: 800px;
      background: var(--dark-surface);
      border-radius: 20px;
      padding: 40px;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }

    @media (max-width: 768px) {
      .article-container {
        padding: 24px;
        border-radius: 12px;
      }
    }

    .back-btn-top {
      display: inline-flex;
      align-items: center;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 24px;
      transition: opacity 0.2s;
    }

    .back-btn-top:hover {
      opacity: 0.8;
    }

    .article-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 24px;
      margin-bottom: 32px;
    }

    .article-header h1 {
      font-size: 2.2rem;
      font-family: var(--font-serif);
      color: white;
      margin-top: 0;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    /* 노션 읽기 뷰 스타일 (기존 모달에서 가져옴 + 다크모드 대응) */
    .notion-reading-view {
      font-family: Pretendard, -apple-system, sans-serif;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.85); /* 다크모드 대응 */
    }
    .notion-reading-view h1 { font-size: 2rem; margin-bottom: 24px; color: white; }
    .notion-reading-view h2 { font-size: 1.5rem; margin-top: 32px; margin-bottom: 16px; color: white; }
    .notion-reading-view h3 { font-size: 1.2rem; margin-top: 24px; margin-bottom: 12px; color: #D9BE91;}
    .notion-reading-view p { margin-bottom: 16px; font-size: 1.05rem; }
    .notion-reading-view img { max-width: 100%; border-radius: 12px; margin: 24px 0; display: block; }
    .notion-reading-view ul, .notion-reading-view ol { margin-left: 24px; margin-bottom: 16px; }
    .notion-reading-view li { margin-bottom: 8px; }
    .notion-reading-view a { color: var(--primary); }

    .bottom-nav {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    
    .btn-back-to-list {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      background: var(--primary);
      color: var(--dark-bg);
      border-radius: 30px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-back-to-list:hover {
      background: white;
      transform: translateY(-2px);
    }

    /* Loading Spinner */
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-spinner {
      display: inline-block; width: 40px; height: 40px; 
      border: 4px solid rgba(255,255,255,0.1); 
      border-top: 4px solid var(--primary); 
      border-radius: 50%; 
      animation: spin 1s linear infinite;
    }
  </style>
</head>

        <h1 id="article-title">로딩 중...</h1>
      </div>

      <div class="bottom-nav">
        <a href="community.html" class="btn-back-to-list">목록으로 돌아가기</a>
      </div>

    </div>
  </main>

  <script src="js/article.js"></script>

</html>
